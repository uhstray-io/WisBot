name: Docker Build

# Validates that the image builds on every PR (build only — no push).
# Publishing to GHCR is handled separately on merge to main.
on:
  pull_request:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "**/*.cs"
      - "Wisbot.csproj"
      - "compose.yaml"
      - ".github/workflows/docker-build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      # The local-dev contract — catch a broken build: stanza or env wiring in PRs.
      - name: Validate compose.yaml
        run: docker compose -f compose.yaml config -q

      - name: Build image (no push)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: false
          tags: wisbot:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
