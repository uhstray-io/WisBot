name: Docker Build

# Validates that the image builds on every PR (build only — no push).
# Publishing to GHCR is handled separately on merge to main.
on:
  pull_request:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "**/*.cs"
      - "Wisbot.csproj"
      - "compose.yaml"
      - ".github/workflows/docker-build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # The local-dev contract — catch a broken build: stanza or env wiring in PRs.
      - name: Validate compose.yaml
        run: docker compose -f compose.yaml config -q

      - name: Build image (no push)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: false
          tags: wisbot:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
