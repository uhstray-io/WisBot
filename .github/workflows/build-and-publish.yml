name: Build and Publish

# Builds the Docker image and pushes it to GHCR on merge to main and on version
# tags. Deployment itself is handled by the agent-cloud platform (pulls this image).
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/uhstray-io/wisbot

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}

      # Build locally first and prove the image actually boots before anything is
      # pushed — a builds-but-crashes regression must not become :latest.
      - name: Build for smoke test
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          load: true
          tags: wisbot:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — container boots and /health answers
        run: |
          docker run -d --name smoke -p 8080:8080 \
            -e DISCORD_TOKEN_WISBOT=smoke-test-dummy \
            -e WISBOT_GUILD_ID=1 \
            -e WISBOT_HEALTH_HOST=+ \
            wisbot:smoke
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/health || true)
            # 503 = Kestrel up, Discord not connected (expected with a dummy token)
            if [ "$code" = "503" ] || [ "$code" = "200" ]; then
              echo "Health endpoint answered ($code) — image boots"
              docker rm -f smoke
              exit 0
            fi
            sleep 2
          done
          echo "::error::Health endpoint never answered — image does not boot"
          docker logs smoke
          docker rm -f smoke
          exit 1

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Attach build provenance (SLSA) + an SBOM to the published image so
          # agent-cloud can verify what it pulls (audit L-17).
          provenance: mode=max
          sbom: true
